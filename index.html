
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Tracker</title>
  <link rel="stylesheet" href="style.css">

  
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">

  <h1>Job Application Tracker</h1>

  
  <div class="dashboard">
    <div class="dashboard-card">
      <h3>Total Jobs</h3>
      <h2 id="total">0</h2>
    </div>
    <div class="dashboard-card">
      <h3>Interview</h3>
      <h2 id="interview">0</h2>
    </div>
    <div class="dashboard-card">
      <h3>Rejected</h3>
      <h2 id="rejected">0</h2>
    </div>
  </div>

  
  <div class="job-header">
    <h2>Available Jobs</h2>
    <p id="job-count">0 Jobs</p>
  </div>

  
  <div class="tabs">
    <button id="all" class="active" onclick="setTab('all')">All</button>
    <button id="interview-tab" onclick="setTab('interview')">Interview</button>
    <button id="rejected-tab" onclick="setTab('rejected')">Rejected</button>
  </div>

  
  <div id="job-container"></div>

</div>

<script src="script.js"></script>


  </body>
</html>
